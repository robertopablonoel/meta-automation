<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spicy Cubes — Meta Ads Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background-color: #faf1e0;
    font-family: 'Georgia', serif;
    color: #000;
    min-height: 100vh;
  }

  header {
    background-color: #7b1c14;
    padding: 32px 48px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 4px solid #ff473b;
  }

  header h1 {
    color: #fdfaf1;
    font-size: 28px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  header .subtitle {
    color: #FCA5A5;
    font-size: 13px;
    letter-spacing: 1px;
    margin-top: 4px;
    font-style: italic;
  }

  .badge {
    background: #ff473b;
    color: #fdfaf1;
    font-size: 11px;
    font-family: monospace;
    padding: 6px 14px;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 48px 32px;
    display: flex;
    flex-direction: column;
    gap: 48px;
  }

  .category-block {
    background: #fdfaf1;
    border-radius: 12px;
    border: 1px solid #e8d9bc;
    box-shadow: 0 4px 20px rgba(123,28,20,0.08);
    overflow: hidden;
  }

  .category-header {
    background: #7b1c14;
    padding: 20px 28px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 20px;
  }

  .category-title {
    color: #fdfaf1;
    font-size: 20px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .category-label {
    color: #FCA5A5;
    font-size: 11px;
    font-family: monospace;
    margin-top: 4px;
    letter-spacing: 1px;
  }

  .video-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: flex-end;
    flex-shrink: 0;
  }

  .pill {
    background: rgba(253,250,241,0.15);
    color: #fdfaf1;
    border: 1px solid rgba(253,250,241,0.3);
    font-size: 11px;
    font-family: monospace;
    padding: 4px 10px;
    border-radius: 20px;
    white-space: nowrap;
  }

  .variations-container {
    padding: 24px 28px;
  }

  .tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .tab-btn {
    background: none;
    border: 1px solid #d4b896;
    color: #444545;
    font-size: 12px;
    font-family: 'Georgia', serif;
    padding: 8px 16px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .tab-btn:hover {
    border-color: #7b1c14;
    color: #7b1c14;
  }

  .tab-btn.active {
    background: #7b1c14;
    border-color: #7b1c14;
    color: #fdfaf1;
  }

  .variation-panel {
    display: none;
  }

  .variation-panel.active {
    display: block;
  }

  .field {
    margin-bottom: 16px;
  }

  .field-label {
    font-size: 10px;
    font-family: monospace;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #7b1c14;
    margin-bottom: 6px;
    font-weight: bold;
  }

  .field-row {
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }

  .field-text {
    flex: 1;
    background: #faf1e0;
    border: 1px solid #e8d9bc;
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 14px;
    line-height: 1.6;
    color: #000;
    font-family: 'Georgia', serif;
  }

  .field-text.headline {
    font-size: 16px;
    font-weight: bold;
    color: #7b1c14;
  }

  .field-text.description {
    font-size: 13px;
    color: #444545;
  }

  .copy-btn {
    background: #fdfaf1;
    border: 1px solid #d4b896;
    color: #7b1c14;
    font-size: 11px;
    font-family: monospace;
    padding: 8px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .copy-btn:hover {
    background: #7b1c14;
    color: #fdfaf1;
    border-color: #7b1c14;
  }

  .copy-btn.copied {
    background: #ff473b;
    color: #fdfaf1;
    border-color: #ff473b;
  }

  .copy-all-btn {
    background: #ff473b;
    color: #fdfaf1;
    border: none;
    font-size: 12px;
    font-family: monospace;
    padding: 10px 20px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 8px;
  }

  .copy-all-btn:hover {
    background: #7b1c14;
  }

  .copy-all-btn.copied {
    background: #444545;
  }

  .divider {
    border: none;
    border-top: 1px solid #e8d9bc;
    margin: 20px 0;
  }

  footer {
    text-align: center;
    padding: 32px;
    color: #444545;
    font-size: 12px;
    font-family: monospace;
    letter-spacing: 1px;
  }

  .export-btn {
    background: #fdfaf1;
    color: #7b1c14;
    border: 2px solid #fdfaf1;
    font-size: 12px;
    font-family: monospace;
    padding: 10px 20px;
    border-radius: 8px;
    cursor: pointer;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .export-btn:hover {
    background: #ff473b;
    border-color: #ff473b;
    color: #fdfaf1;
  }

  .error-state {
    text-align: center;
    padding: 80px 32px;
    color: #7b1c14;
    font-family: monospace;
  }

  .error-state h2 {
    font-size: 18px;
    margin-bottom: 12px;
  }

  .error-state p {
    font-size: 13px;
    color: #444545;
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>Spicy Cubes</h1>
    <div class="subtitle">Meta Ads Copy Dashboard</div>
  </div>
  <div style="display:flex;align-items:center;gap:12px">
    <div class="badge" id="badge">Loading...</div>
    <button class="export-btn" onclick="exportToMeta()">↓ Export for Meta</button>
  </div>
</header>

<main id="main"></main>

<footer>spicycubes.com — meta ads pipeline output</footer>

<script>
// ── Language ──────────────────────────────────────────────────────────────
const params = new URLSearchParams(window.location.search);
let uiLang = params.get('lang') || 'es';  // resolved after data loads

const T = {
  en: {
    loading: 'Loading...',
    noData: 'No data',
    badge: (cats, vids, vars) => `${cats} Categories · ${vids} Videos · ${vars} Variations`,
    variation: i => `Variation ${i}`,
    copy: 'Copy',
    copied: '✓ Copied',
    copyAll: 'Copy All',
    allCopied: '✓ All Copied',
    noFile: 'No output file found',
    noFileHint: 'Run the pipeline first: <code>venv/bin/python -m pipeline.run --language en</code>',
  },
  es: {
    loading: 'Cargando...',
    noData: 'Sin datos',
    badge: (cats, vids, vars) => `${cats} Categorías · ${vids} Videos · ${vars} Variaciones`,
    variation: i => `Variación ${i}`,
    copy: 'Copiar',
    copied: '✓ Copiado',
    copyAll: 'Copiar Todo',
    allCopied: '✓ Todo Copiado',
    noFile: 'No se encontró el archivo de output',
    noFileHint: 'Corre el pipeline primero: <code>venv/bin/python -m pipeline.run --language es</code>',
  },
};

function t() { return T[uiLang] || T.es; }

// ── Data ──────────────────────────────────────────────────────────────────
function toLabel(concept) {
  return concept.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

function buildData(raw) {
  const map = new Map();
  for (const item of raw) {
    const key = item.creative_concept;
    if (!key) continue;
    if (!map.has(key)) {
      map.set(key, {
        concept: key,
        label: toLabel(key),
        videos: [],
        ad_filenames: [],
        variations: item.ad_copy_variations || [],
      });
    }
    map.get(key).videos.push(item.filename);
    if (item.ad_filename) map.get(key).ad_filenames.push(item.ad_filename);
  }
  return Array.from(map.values()).filter(c => c.variations.length > 0);
}

// Variation data store — keyed by "ci-vi", avoids inline JSON in onclick attrs
const varStore = {};
// Active variation per category index
const activeVar = {};
// Video filename → Meta Video ID mapping
let videoIds = {};
// Hook text (first ~6 words of transcript) per category index
// Category metadata per index
const catStore = {};

async function loadData() {
  const langParam = params.get('lang');
  const candidates = langParam
    ? [`../output/consolidated_${langParam}.json`]
    : ['../output/consolidated_es.json', '../output/consolidated_en.json', '../output/consolidated.json'];

  for (const url of candidates) {
    try {
      const res = await fetch(`${url}?t=${Date.now()}`);
      if (!res.ok) continue;
      const raw = await res.json();
      const fileLang = url.match(/consolidated_(\w+)\.json/)?.[1];
      if (fileLang && fileLang !== 'auto') uiLang = fileLang;
      document.title = `Spicy Cubes — ${url.split('/').pop().replace('.json', '')}`;
      return buildData(raw);
    } catch (_) { continue; }
  }

  document.getElementById('main').innerHTML = `
    <div class="error-state">
      <h2>${t().noFile}</h2>
      <p>${t().noFileHint}</p>
    </div>`;
  document.getElementById('badge').textContent = t().noData;
  return null;
}

// ── Copy helpers ──────────────────────────────────────────────────────────
function copyField(ci, vi, field, btn) {
  const text = varStore[`${ci}-${vi}`]?.[field] || '';
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = t().copied;
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = t().copy; btn.classList.remove('copied'); }, 1500);
  });
}

function copyAll(ci, vi, btn) {
  const v = varStore[`${ci}-${vi}`] || {};
  const full = `PRIMARY TEXT:\n${v.primary_text || ''}\n\nHEADLINE:\n${v.headline || ''}\n\nDESCRIPTION:\n${v.description || ''}`;
  navigator.clipboard.writeText(full).then(() => {
    btn.textContent = t().allCopied;
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = t().copyAll; btn.classList.remove('copied'); }, 1500);
  });
}

function switchTab(ci, vi) {
  document.querySelectorAll(`.variation-panel[data-cat="${ci}"]`).forEach(p => p.classList.remove('active'));
  document.querySelectorAll(`.tab-btn[data-cat="${ci}"]`).forEach(b => b.classList.remove('active'));
  document.querySelector(`.variation-panel[data-cat="${ci}"][data-var="${vi}"]`).classList.add('active');
  document.querySelector(`.tab-btn[data-cat="${ci}"][data-var="${vi}"]`).classList.add('active');
  activeVar[ci] = vi;
}

// ── Render ────────────────────────────────────────────────────────────────
function escapeHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Meta Export ───────────────────────────────────────────────────────────
async function exportToMeta() {
  const CAMPAIGN    = 'Spicy Cubes Dailies - English UGC';
  const CAMPAIGN_ID = '120241040507080467';
  const AD_SET      = 'Batch #3';

  // Fields to clear — keep Campaign ID so Meta routes to the existing campaign;
  // clear Ad Set ID so Meta looks up by name instead of pointing to old ad set
  const CLEAR_FIELDS = new Set([
    'Ad Set ID', 'Ad ID',
    'Preview Link', 'Instagram Preview Link', 'Permalink', 'Story ID',
  ]);

  // Fields to overwrite with our data (everything else inherits from the template row)
  const OVERWRITE = {
    'Campaign ID':       ()        => CAMPAIGN_ID,
    'Campaign Name':     ()        => CAMPAIGN,
    'Campaign Status':   ()        => 'PAUSED',
    'Ad Set Name':       ()        => AD_SET,
    'Ad Set Run Status': ()       => 'PAUSED',
    'Ad Status':         ()       => 'PAUSED',
    'Ad Name':           (cat)    => (cat.ad_filenames[0] || '').replace(/\.[^.]+$/, ''),
    'Body':              (cat, v) => v.primary_text || '',
    'Title':             (cat, v) => v.headline || '',
    'Link Description':  (cat, v) => v.description || '',
    'Video ID':          (cat)    => cat.videos.map(f => videoIds[f] || '').filter(Boolean).join(', '),
    'Video File Name':   (cat)    => cat.ad_filenames.join(', '),
    'Link':              ()       => 'https://www.spicycubes.com/products/spicy-cubes-pineapple-dailies-for-her-2',
  };

  // Load the real exported file as the base
  let wb;
  try {
    const res = await fetch('meta_export_template.xlsx');
    const buf = await res.arrayBuffer();
    wb = XLSX.read(buf, { type: 'array' });
  } catch (e) {
    alert('Could not load export template: ' + e.message);
    return;
  }

  const ws = wb.Sheets['Sheet1'];
  const range = XLSX.utils.decode_range(ws['!ref']);

  // Build column index map from header row
  const colMap = {};
  for (let c = range.s.c; c <= range.e.c; c++) {
    const cell = ws[XLSX.utils.encode_cell({ r: 0, c })];
    if (cell && cell.v) colMap[cell.v] = c;
  }

  // Clone row 2 (first real ad) as the base template for all new rows
  const templateRow = {};
  for (let c = range.s.c; c <= range.e.c; c++) {
    const cell = ws[XLSX.utils.encode_cell({ r: 1, c })];
    templateRow[c] = cell ? { ...cell } : null;
  }

  // Delete all existing data rows (keep only header)
  for (let r = 1; r <= range.e.r; r++) {
    for (let c = range.s.c; c <= range.e.c; c++) {
      delete ws[XLSX.utils.encode_cell({ r, c })];
    }
  }

  // Write one row per video (each video in a category gets its own ad row)
  let rowIdx = 1;
  Object.keys(catStore).forEach(ci => {
    const cat = { ...catStore[ci], _ci: ci };
    const vi = activeVar[ci] ?? 0;
    const v = varStore[`${ci}-${vi}`];
    if (!v) return;

    cat.ad_filenames.forEach((adFilename, vidIdx) => {
      // Single-video cat proxy for OVERWRITE functions
      const singleCat = { ...cat, ad_filenames: [adFilename], videos: [cat.videos[vidIdx] || ''] };

      // Clone template row
      for (let c = range.s.c; c <= range.e.c; c++) {
        if (templateRow[c]) ws[XLSX.utils.encode_cell({ r: rowIdx, c })] = { ...templateRow[c] };
      }

      // Clear ID fields
      CLEAR_FIELDS.forEach(header => {
        const c = colMap[header];
        if (c !== undefined) delete ws[XLSX.utils.encode_cell({ r: rowIdx, c })];
      });

      // Overwrite with our data
      Object.entries(OVERWRITE).forEach(([header, fn]) => {
        const c = colMap[header];
        if (c === undefined) return;
        ws[XLSX.utils.encode_cell({ r: rowIdx, c })] = { t: 's', v: fn(singleCat, v) };
      });

      rowIdx++;
    });
  });

  range.e.r = rowIdx - 1;
  ws['!ref'] = XLSX.utils.encode_range(range);

  const lang = uiLang !== 'auto' ? `_${uiLang}` : '';
  XLSX.writeFile(wb, `meta_bulk_upload${lang}.xlsx`);

  // Also download video_ids.json if any videos are missing IDs
  const missingIds = {};
  Object.values(catStore).forEach(cat => {
    cat.videos.forEach(filename => {
      if (!videoIds[filename]) missingIds[filename] = '';
    });
  });
  if (Object.keys(missingIds).length > 0) {
    const blob = new Blob([JSON.stringify(missingIds, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'video_ids.json';
    a.click();
  }
}

async function init() {
  // Try to load video ID mapping
  try {
    const res = await fetch('../output/video_ids.json');
    if (res.ok) videoIds = await res.json();
  } catch (_) {}

  const data = await loadData();
  if (!data) return;

  const totalVideos = data.reduce((n, c) => n + c.videos.length, 0);
  const totalVariations = data.reduce((n, c) => n + c.variations.length, 0);
  document.getElementById('badge').textContent = t().badge(data.length, totalVideos, totalVariations);

  const main = document.getElementById('main');
  data.forEach((cat, ci) => {
    // Store variations for safe retrieval by copy buttons
    cat.variations.forEach((v, vi) => { varStore[`${ci}-${vi}`] = v; });
    activeVar[ci] = 0;
    catStore[ci] = cat;

    const block = document.createElement('div');
    block.className = 'category-block';

    const pills = cat.ad_filenames.map(f => {
      const hook = f.replace(/^[^-]+-/, '').replace(/\.[^.]+$/, '');
      return `<span class="pill">${escapeHtml(hook)}</span>`;
    }).join('');

    const tabs = cat.variations.map((_, vi) =>
      `<button class="tab-btn${vi === 0 ? ' active' : ''}" data-cat="${ci}" data-var="${vi}" onclick="switchTab(${ci},${vi})">${t().variation(vi + 1)}</button>`
    ).join('');

    const panels = cat.variations.map((v, vi) => `
      <div class="variation-panel${vi === 0 ? ' active' : ''}" data-cat="${ci}" data-var="${vi}">
        <div class="field">
          <div class="field-label">Primary Text</div>
          <div class="field-row">
            <div class="field-text">${escapeHtml(v.primary_text || '')}</div>
            <button class="copy-btn" onclick="copyField(${ci},${vi},'primary_text',this)">${t().copy}</button>
          </div>
        </div>
        <div class="field">
          <div class="field-label">Headline</div>
          <div class="field-row">
            <div class="field-text headline">${escapeHtml(v.headline || '')}</div>
            <button class="copy-btn" onclick="copyField(${ci},${vi},'headline',this)">${t().copy}</button>
          </div>
        </div>
        <div class="field">
          <div class="field-label">Description</div>
          <div class="field-row">
            <div class="field-text description">${escapeHtml(v.description || '')}</div>
            <button class="copy-btn" onclick="copyField(${ci},${vi},'description',this)">${t().copy}</button>
          </div>
        </div>
        <button class="copy-all-btn" onclick="copyAll(${ci},${vi},this)">${t().copyAll}</button>
      </div>
    `).join('');

    block.innerHTML = `
      <div class="category-header">
        <div>
          <div class="category-title">${escapeHtml(cat.label)}</div>
          <div class="category-label">${escapeHtml(cat.concept)}</div>
        </div>
        <div class="video-pills">${pills}</div>
      </div>
      <div class="variations-container">
        <div class="tabs">${tabs}</div>
        ${panels}
      </div>
    `;

    main.appendChild(block);
  });
}

init();
</script>
</body>
</html>
