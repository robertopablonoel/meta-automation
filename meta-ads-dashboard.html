function copyText(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ Copiado';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = 'Copiar';
      btn.classList.remove('copied');
    }, 1500);
  });
}

function copyAll(variation, btn) {
  const full = `PRIMARY TEXT:\n${variation.primary_text}\n\nHEADLINE:\n${variation.headline}\n\nDESCRIPTION:\n${variation.description}`;
  navigator.clipboard.writeText(full).then(() => {
    btn.textContent = '✓ Todo Copiado';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = 'Copiar Todo';
      btn.classList.remove('copied');
    }, 1500);
  });
}

function switchTab(categoryIndex, varIndex) {
  const panels = document.querySelectorAll(`.variation-panel[data-cat="${categoryIndex}"]`);
  const tabs = document.querySelectorAll(`.tab-btn[data-cat="${categoryIndex}"]`);
  panels.forEach(p => p.classList.remove('active'));
  tabs.forEach(t => t.classList.remove('active'));
  document.querySelector(`.variation-panel[data-cat="${categoryIndex}"][data-var="${varIndex}"]`).classList.add('active');
  document.querySelector(`.tab-btn[data-cat="${categoryIndex}"][data-var="${varIndex}"]`).classList.add('active');
}

const main = document.getElementById('main');

  const tabs = cat.variations.map((_, vi) =>

        <div class="field-label">Primary Text</div>
